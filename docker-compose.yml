# ═══════════════════════════════════════════════════════════════════════════════
#  Vera Orchestration Platform — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
#  Services:
#    vera         – FastAPI orchestrator (port 8999)
#    redis        – Event streams, task queues, caching (port 6379)
#    postgres     – Persistent storage (port 5433)
#    chromadb     – Vector embeddings store (port 8008)
#    neo4j        – Memory graph database (ports 7474/7687)
#
#  Ollama GPU/CPU workers are expected to run on separate hosts and are
#  configured via environment variables (OLLAMA_GPU_URL, etc).
#
#  Usage:
#    docker compose up -d            # start everything
#    docker compose up -d --build    # rebuild vera image
#    docker compose logs -f vera     # follow orchestrator logs
#    docker compose down -v          # tear down (including volumes)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Vera Orchestrator ──────────────────────────────────────────────────────
  vera:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vera-orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-8999}:8999"
    environment:
      # ── Core
      ORCHESTRATOR_HOST: "0.0.0.0"
      ORCHESTRATOR_PORT: "8999"
      BACKEND_HOST: "${BACKEND_HOST:-llm.int}"

      # ── Backing services (point at compose service names)
      REDIS_URL: "redis://redis:6379"
      POSTGRES_URL: "postgresql://admin:admin@postgres:5432/postgres"
      CHROMA_HOST: "chromadb"
      CHROMA_PORT: "8000"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASS: "${NEO4J_PASS:-veraneo4j}"

      # ── Ollama cluster (external hosts — override as needed)
      OLLAMA_GPU_URL: "${OLLAMA_GPU_URL:-http://192.168.0.250:11435}"
      OLLAMA_CPU_A_URL: "${OLLAMA_CPU_A_URL:-http://192.168.0.246:11435}"
      OLLAMA_CPU_B_URL: "${OLLAMA_CPU_B_URL:-http://192.168.0.247:11435}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-mistral}"
      OLLAMA_EMBED_URL: "${OLLAMA_EMBED_URL:-http://192.168.0.246:11435}"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-nomic-embed-text}"

      # ── GPU inference (Whisper / TTS / SD — external host)
      GPU_INFER_URL: "${GPU_INFER_URL:-http://192.168.0.250:8765}"

      # ── IDE projects root (inside container)
      VERA_PROJECT_ROOT: "/data/projects"

      # ── Tuning
      MAX_CAPS_IN_PROMPT: "${MAX_CAPS_IN_PROMPT:-25}"
      EMBED_CAPS_ON_START: "${EMBED_CAPS_ON_START:-1}"
      SYSLOG_MONITOR: "${SYSLOG_MONITOR:-1}"
    volumes:
      - vera-projects:/data/projects
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vera-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vera-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - vera-net

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vera-postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - vera-net

  # ── ChromaDB (vector store) ────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: vera-chromadb
    ports:
      - "${CHROMA_PORT:-8008}:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    restart: unless-stopped
    networks:
      - vera-net

  # ── Neo4j (memory graph) ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: vera-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASS:-veraneo4j}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: "512m"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASS:-veraneo4j} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - vera-net

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  redis-data:
  pg-data:
  chroma-data:
  neo4j-data:
  vera-projects:

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  vera-net:
    driver: bridge